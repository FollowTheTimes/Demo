[uwsgi]
# 基本配置
socket = :8000
chdir = /app
module = seckill_project.wsgi:application

# 进程和线程配置
processes = 8
threads = 4
master = true
vacuum = true

# 日志配置
logto = /app/logs/uwsgi.log
logfile-chmod = 644
logdate = true

# 超时设置
timeout = 30
harakiri = 30
harakiri-verbose = true

# 缓冲区设置
buffer-size = 32768

# 进程管理
pidfile = /app/uwsgi.pid
die-on-term = true

# 性能优化
enable-threads = true
thunder-lock = true

# 内存管理
enable-metrics = true
memory-report = true
