{% extends "admin/base.html" %}

{% block title %}{% if subtitle %}{{ subtitle }} | {% endif %}{{ title }} | 秒杀管理系统{% endblock %}

{% block branding %}
<div id="site-name"><a href="{% url 'admin:index' %}">秒杀管理系统</a></div>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
/* 自定义样式 */
body {
    font-family: 'Microsoft YaHei', Arial, sans-serif;
}

/* 侧边栏样式 */
#content-related {
    background-color: #f8f9fa;
    border-left: 1px solid #e9ecef;
}

/* 表格样式 */
table {
    border-collapse: collapse;
    width: 100%;
}

th, td {
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid #e9ecef;
}

th {
    background-color: #f8f9fa;
    font-weight: 600;
}

/* 按钮样式 */
.button, input[type="submit"], input[type="button"], .submit-row input {
    background-color: #4CAF50;
    color: white;
    border: none;
    padding: 6px 12px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 14px;
    margin: 4px 2px;
    cursor: pointer;
    border-radius: 4px;
}

.button:hover, input[type="submit"]:hover, input[type="button"]:hover, .submit-row input:hover {
    background-color: #45a049;
}

/* 搜索框样式 */
#changelist-search input {
    border: 1px solid #ced4da;
    border-radius: 4px;
    padding: 6px 12px;
    width: 250px;
}

/* 筛选器样式 */
.filtered {
    border: 1px solid #ced4da;
    border-radius: 4px;
    padding: 10px;
    background-color: #f8f9fa;
}

/* 状态开关样式 */
.toggle-switch {
    position: relative;
    display: inline-block;
    width: 40px;
    height: 20px;
}

.toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.toggle-slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #ccc;
    transition: .4s;
    border-radius: 20px;
}

.toggle-slider:before {
    position: absolute;
    content: "";
    height: 16px;
    width: 16px;
    left: 2px;
    bottom: 2px;
    background-color: white;
    transition: .4s;
    border-radius: 50%;
}

input:checked + .toggle-slider {
    background-color: #4CAF50;
}

input:focus + .toggle-slider {
    box-shadow: 0 0 1px #4CAF50;
}

input:checked + .toggle-slider:before {
    transform: translateX(20px);
}

/* 分页样式 */
.paginator {
    background-color: #f8f9fa;
    border: 1px solid #e9ecef;
    border-radius: 4px;
    padding: 10px;
    margin-top: 20px;
}

.paginator a {
    color: #4CAF50;
    text-decoration: none;
    padding: 4px 8px;
    border: 1px solid #e9ecef;
    border-radius: 4px;
    margin: 0 2px;
}

.paginator a:hover {
    background-color: #e9ecef;
}

.paginator .this-page {
    color: white;
    background-color: #4CAF50;
    padding: 4px 8px;
    border: 1px solid #4CAF50;
    border-radius: 4px;
    margin: 0 2px;
}

/* 状态标签样式 */
.status-tag {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 500;
}

.status-normal {
    background-color: #d4edda;
    color: #155724;
}

.status-warning {
    background-color: #fff3cd;
    color: #856404;
}

.status-danger {
    background-color: #f8d7da;
    color: #721c24;
}

.status-info {
    background-color: #d1ecf1;
    color: #0c5460;
}
</style>
{% endblock %}

{% block nav-global %}
{% endblock %}
