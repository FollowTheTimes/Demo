{% extends 'admin/base.html' %}

{% block title %}个人资料 - 秒杀管理系统{% endblock %}

{% block content %}
    <div class="card">
        <h1>个人资料</h1>
        
        {% if messages %}
            {% for message in messages %}
                <div class="message success">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">用户名:</label>
                <input type="text" id="id_username" value="{{ user.username }}" disabled>
            </div>
            <div class="form-group">
                <label for="id_email">邮箱:</label>
                <input type="email" id="id_email" value="{{ user.email }}" disabled>
            </div>
            <div class="form-group">
                <label for="id_phone">手机号:</label>
                <input type="text" id="id_phone" name="phone" value="{{ user.phone|default:'' }}" max_length="11">
            </div>
            <div class="form-group">
                <label for="id_gender">性别:</label>
                <select id="id_gender" name="gender">
                    <option value="">请选择</option>
                    <option value="male" {% if user.gender == 'male' %}selected{% endif %}>男</option>
                    <option value="female" {% if user.gender == 'female' %}selected{% endif %}>女</option>
                    <option value="other" {% if user.gender == 'other' %}selected{% endif %}>其他</option>
                </select>
            </div>
            <div class="form-group">
                <label for="id_birthday">出生日期:</label>
                <input type="date" id="id_birthday" name="birthday" value="{{ user.birthday|date:'Y-m-d'|default:'' }}">
            </div>
            <div class="form-group">
                <label for="id_bio">个人简介:</label>
                <textarea id="id_bio" name="bio" rows="4" cols="50">{{ user.bio|default:'' }}</textarea>
            </div>
            <div class="form-group">
                <label for="id_avatar">头像:</label>
                {% if user.avatar %}
                    <img src="{{ user.avatar.url }}" alt="头像" style="max-width: 100px; max-height: 100px; margin-bottom: 10px;">
                {% endif %}
                <input type="file" id="id_avatar" name="avatar">
            </div>
            <div class="submit-row">
                <input type="submit" value="保存">
            </div>
        </form>
    </div>
{% endblock %}
